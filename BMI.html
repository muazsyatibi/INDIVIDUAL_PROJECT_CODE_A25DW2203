    <div class="page-container">

        <nav class="top-nav">

            <a href="personalInfo.html">Personal Info</a>
            <a href="curricVitae.html">CV</a>

        <section class="bmi-box">

            <h1>BMI Checker</h1>

            <p>
                Enter your weight and height to calculate your Body Mass Index.
            </p>

            <label for="weight">Weight in kilograms:</label>
            <input type="number" id="weight" placeholder="Example: 95">

            <label for="height">Height in meters:</label>
            <input type="number" id="height" placeholder="Example: 1.93" step="0.01">

            <button onclick="calculateBMI()">Calculate BMI</button>

            <p id="bmiResult">Your BMI result will appear here.</p>

        </section>

    </div>

    <script src="BMI.js"></script>
</body>
